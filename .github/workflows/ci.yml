name: Node.js CI

on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main

permissions:
    contents: read

jobs:
    ci:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Detect Node project
              id: detect
              run: |
                  if [ -f package.json ]; then
                    echo "has_package=true" >> "$GITHUB_OUTPUT"
                  else
                    echo "has_package=false" >> "$GITHUB_OUTPUT"
                  fi

            - name: Setup Node.js
              if: steps.detect.outputs.has_package == 'true'
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: npm

            - name: Install dependencies
              if: steps.detect.outputs.has_package == 'true'
              run: |
                  if [ -f package-lock.json ]; then
                    npm ci
                  else
                    npm install
                  fi

            - name: Lint
              if: steps.detect.outputs.has_package == 'true'
              run: npm run lint --if-present

            - name: Test
              if: steps.detect.outputs.has_package == 'true'
              run: npm test --if-present

            - name: Build
              if: steps.detect.outputs.has_package == 'true'
              run: npm run build --if-present

            - name: No package.json found
              if: steps.detect.outputs.has_package != 'true'
              run: echo "No package.json found yet; skipping Node.js CI steps."
